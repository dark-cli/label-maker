<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Label Maker</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --col-ac:  #e02020;
  --col-eth: #1a6fd4;
  --col-fbr: #b89000;
  --col-dc:  #e07a00;
  --col-sw:  #7b3fc4;
}

html, body { height: 100%; }

body {
  background: #1a1a1a;
  font-family: 'Barlow Condensed', sans-serif;
  color: #ccc;
}

/* ═══════════ APP SHELL ═══════════ */
#app { height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* ── Tab Bar ── */
#tab-bar {
  background: #0a0a0a;
  padding: 0 16px;
  display: flex;
  align-items: stretch;
  border-bottom: 2px solid #1e1e1e;
  flex-shrink: 0;
}

#app-title {
  font-family: 'Oswald', sans-serif;
  font-size: 13px; font-weight: 700; letter-spacing: 0.2em;
  color: #fff;
  display: flex; align-items: center;
  padding-right: 20px;
  border-right: 1px solid #1e1e1e;
  margin-right: 8px;
}

.tab-btn {
  font-family: 'Oswald', sans-serif;
  font-size: 11px; font-weight: 700; letter-spacing: 0.15em;
  text-transform: uppercase;
  background: transparent; border: none;
  color: #555;
  padding: 12px 18px; cursor: pointer;
  position: relative; transition: color 0.12s;
}
.tab-btn:hover { color: #999; }
.tab-btn.active { color: #fff; }
.tab-btn.active::after {
  content: '';
  position: absolute; bottom: -2px; left: 0; right: 0; height: 2px;
  background: #c01010;
}

/* ── Panels ── */
.panel { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.panel.active { display: flex; }

/* ═══════════ EDIT PANEL ═══════════ */
#panel-edit { overflow-y: auto; padding: 16px; gap: 12px; }

/* Toolbar */
#edit-toolbar {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  padding-bottom: 12px;
  border-bottom: 1px solid #2a2a2a;
  flex-shrink: 0;
}

.btn {
  font-family: 'Oswald', sans-serif;
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 6px 14px; border-radius: 4px; border: none; cursor: pointer;
}
.btn-primary   { background: #c01010; color: #fff; }
.btn-primary:hover   { background: #a00; }
.btn-secondary { background: #252525; color: #bbb; border: 1px solid #333; }
.btn-secondary:hover { background: #303030; color: #fff; }
.btn-icon {
  background: transparent; border: none; cursor: pointer;
  color: #444; font-size: 13px; line-height: 1;
  padding: 3px 6px; border-radius: 3px;
}
.btn-icon:hover { color: #e05050; background: #2a1010; }

/* Groups */
#groups-list { display: flex; flex-direction: column; gap: 12px; }

.group-card {
  background: #202020;
  border: 1px solid #2e2e2e;
  border-radius: 6px;
  overflow: hidden;
}

.group-header {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
  background: #282828;
  border-bottom: 1px solid #2e2e2e;
}

.group-title-input {
  flex: 1;
  background: transparent; border: none; outline: none;
  font-family: 'Oswald', sans-serif;
  font-size: 12px; font-weight: 700; letter-spacing: 0.1em;
  color: #fff;
}
.group-title-input::placeholder { color: #3a3a3a; }

/* Labels table */
.labels-table { width: 100%; border-collapse: collapse; }

.labels-table th {
  font-family: 'Oswald', sans-serif;
  font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase;
  color: #444; padding: 5px 8px;
  border-bottom: 1px solid #282828;
  text-align: left; background: #1c1c1c;
}

.labels-table td {
  padding: 2px 4px;
  border-bottom: 1px solid #252525;
  vertical-align: middle;
}
.labels-table tr:last-child td { border-bottom: none; }
.labels-table tr:hover td { background: rgba(255,255,255,0.015); }

.cell-input {
  background: transparent; border: none; outline: none;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; color: #bbb;
  width: 100%; padding: 4px;
  border-radius: 3px;
}
.cell-input:focus { background: #2a2a2a; color: #fff; }
.cell-input.code {
  font-family: 'Oswald', sans-serif;
  font-size: 10px; font-weight: 700; letter-spacing: 0.03em; color: #ddd;
}

.cell-select {
  background: #242424; border: 1px solid #333;
  color: #bbb; border-radius: 3px;
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px;
  padding: 3px 4px; cursor: pointer; outline: none; width: 100%;
}
.cell-select:focus { border-color: #555; color: #fff; }

.type-cell { display: flex; align-items: center; gap: 5px; }
.type-swatch { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ═══════════ PREVIEW PANEL ═══════════ */
#panel-preview { overflow: hidden; }

/* ── Control Panel ── */
#ctrl-panel {
  background: #111;
  padding: 12px 16px 10px;
  flex-shrink: 0;
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
}
#ctrl-panel h1 {
  font-family: 'Oswald', sans-serif;
  font-size: 14px; font-weight: 700; letter-spacing: 0.15em;
  color: #fff; margin-bottom: 8px;
}
.ctrl-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
  gap: 7px; margin-bottom: 8px;
}
.ctrl-group { background: #1e1e1e; border-radius: 5px; padding: 7px 9px; }
.ctrl-group-title {
  font-family: 'Oswald', sans-serif;
  font-size: 7.5px; letter-spacing: 0.22em; color: #555;
  text-transform: uppercase;
  border-bottom: 1px solid #2a2a2a;
  padding-bottom: 4px; margin-bottom: 5px;
}
.ctrl-row { margin-bottom: 4px; }
.ctrl-row:last-child { margin-bottom: 0; }
.ctrl-row label { display: flex; justify-content: space-between; font-size: 9.5px; color: #999; margin-bottom: 2px; }
.ctrl-row label span {
  font-family: 'Oswald', monospace;
  font-size: 9.5px; color: #fff; font-weight: 600; min-width: 34px; text-align: right;
}
input[type=range] {
  width: 100%; height: 3px; cursor: pointer;
  appearance: none; -webkit-appearance: none;
  background: #383838; border-radius: 2px; outline: none;
}
input[type=range]::-webkit-slider-thumb {
  appearance: none; width: 11px; height: 11px; border-radius: 50%;
  background: #fff; cursor: pointer; border: 2px solid #555;
}
#ctrl-panel select {
  background: #2a2a2a; color: #fff; border: 1px solid #3a3a3a;
  border-radius: 4px; padding: 3px 5px;
  font-family: 'Oswald', sans-serif; font-size: 9.5px;
  width: 100%; cursor: pointer; outline: none; margin-top: 2px;
}
.ctrl-bottom { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.btn-print {
  background: #c01010; color: #fff; border: none;
  font-family: 'Oswald', sans-serif;
  font-size: 12px; font-weight: 700; letter-spacing: 0.1em;
  padding: 7px 20px; border-radius: 4px; cursor: pointer; text-transform: uppercase;
}
.btn-print:hover { background: #a00; }
#page-note { font-size: 9px; color: #555; }

/* ── Page Preview ── */
#preview-area {
  flex: 1; overflow: auto;
  padding: 16px;
  display: flex; justify-content: center; align-items: flex-start;
}

#page-preview {
  background: #fff;
  box-shadow: 0 4px 24px rgba(0,0,0,0.35);
  position: relative; overflow: hidden;
  transition: width 0.2s, height 0.2s;
}

#label-content { padding: 8mm; }

/* ── Section titles ── */
.section-title {
  font-family: 'Oswald', sans-serif;
  font-size: 8px; font-weight: 600; letter-spacing: 0.2em;
  text-transform: uppercase; color: #666;
  margin: 4mm 0 1.5mm 0;
}
.section-title:first-child { margin-top: 0; }

/* ── Label rows ── */
.label-row { display: flex; flex-wrap: wrap; gap: 2.5mm; margin-bottom: 1mm; }

/* ── Label ── */
.label {
  display: flex; border: 0.5mm solid #000;
  overflow: hidden; break-inside: avoid; position: relative;
}

/* ── Face ── */
.face, .face2 {
  width: var(--face-w, 37mm);
  display: flex; flex-direction: column; justify-content: center;
  padding: 1mm 1.5mm 1mm 1mm;
  position: relative; overflow: hidden; flex-shrink: 0; background: #fff;
}
.face  { border-right: 0.3mm dashed #ccc; }
.face2 { border-left:  0.3mm dashed #ccc; }

.face-bg {
  position: absolute; inset: 0;
  background-repeat: repeat; pointer-events: none; z-index: 0;
}

.face-content { position: relative; z-index: 1; width: 100%; }

.face-content .code {
  font-family: 'Oswald', sans-serif;
  font-weight: 700; letter-spacing: 0.03em; line-height: 1.05;
  color: #000; white-space: normal; word-break: break-all;
  display: block; width: 100%;
}
.face-content .desc {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800; color: #222;
  margin-top: 0.3mm; line-height: 1.2;
  white-space: normal; word-break: break-word;
  display: block; width: 100%;
}

/* ── Color bars (widths overridden by JS) ── */
.cat-ac  .face  { border-left: 3mm solid var(--col-ac);  }
.cat-ac  .face2 { border-right: 3mm solid var(--col-ac); }
.cat-eth .face  { border-left: 3mm solid var(--col-eth); }
.cat-eth .face2 { border-right: 3mm solid var(--col-eth);}
.cat-fbr .face  { border-left: 3mm solid var(--col-fbr); }
.cat-fbr .face2 { border-right: 3mm solid var(--col-fbr);}
.cat-dc  .face  { border-left: 3mm solid var(--col-dc);  }
.cat-dc  .face2 { border-right: 3mm solid var(--col-dc); }
.cat-sw  .face  { border-left: 3mm solid var(--col-sw);  }
.cat-sw  .face2 { border-right: 3mm solid var(--col-sw); }

/* ── Wrap zone ── */
.wrap-zone {
  width: var(--wrap-w, 7mm);
  position: relative; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  background-image: repeating-linear-gradient(-45deg, rgba(0,0,0,0.06), rgba(0,0,0,0.06) 1.5mm, transparent 1.5mm, transparent 3mm);
  overflow: hidden;
}
.wrap-bg {
  position: absolute; inset: 0;
  background-repeat: repeat; pointer-events: none; z-index: 0;
}
.wrap-text {
  position: relative; z-index: 1;
  font-family: 'Oswald', sans-serif;
  font-size: 3.5pt; color: rgba(0,0,0,0.28);
  letter-spacing: 0.18em; text-transform: uppercase;
  writing-mode: vertical-rl; transform: rotate(180deg);
}

/* ── Legend ── */
.legend {
  display: flex; gap: 4mm; flex-wrap: wrap; margin: 3mm 0 2mm;
  font-family: 'Barlow Condensed', sans-serif; font-size: 8px; font-weight: 700;
}
.legend-item { display: flex; align-items: center; gap: 1.5mm; }
.legend-bar { width: 4mm; height: 9px; border-radius: 1px; }

/* ═══════════ PRINT ═══════════ */
@media print {
  body { background: #fff !important; }
  #tab-bar, #panel-edit { display: none !important; }
  #panel-preview { display: flex !important; }
  #ctrl-panel { display: none !important; }
  #preview-area { padding: 0 !important; display: block !important; overflow: visible !important; }
  #page-preview { box-shadow: none !important; width: 100% !important; height: auto !important; overflow: visible !important; }
  #label-content { padding: 0 !important; }
  .section-title { color: #000; }
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
}
</style>
</head>
<body>
<div id="app">

<!-- ═══════════ TAB BAR ═══════════ -->
<div id="tab-bar">
  <span id="app-title">&#9632; LABEL MAKER</span>
  <button class="tab-btn active" data-tab="edit">Edit Labels</button>
  <button class="tab-btn" data-tab="preview">Preview &amp; Print</button>
</div>

<!-- ═══════════ EDIT PANEL ═══════════ -->
<div id="panel-edit" class="panel active">
  <div id="edit-toolbar">
    <button class="btn btn-primary"   id="btn-add-group">+ Add Group</button>
    <button class="btn btn-secondary" id="btn-export">Export JSON</button>
    <button class="btn btn-secondary" id="btn-import">Import JSON</button>
    <input type="file" id="file-import" accept=".json" style="display:none">
    <span style="font-size:9px;color:#333;margin-left:auto;">Auto-saved to browser</span>
  </div>
  <div id="groups-list"></div>
</div>

<!-- ═══════════ PREVIEW PANEL ═══════════ -->
<div id="panel-preview" class="panel">

  <div id="ctrl-panel">
    <h1>&#9881; LABEL SETTINGS</h1>
    <div class="ctrl-grid">

      <div class="ctrl-group">
        <div class="ctrl-group-title">Label Dimensions</div>
        <div class="ctrl-row">
          <label>Face Width <span id="v-facewidth"></span></label>
          <input type="range" id="sl-facewidth" min="20" max="80" value="65" step="1">
        </div>
        <div class="ctrl-row">
          <label>Wrap Width <span id="v-wrapwidth"></span></label>
          <input type="range" id="sl-wrapwidth" min="4" max="35" value="8" step="1">
        </div>
        <div class="ctrl-row">
          <label>Label Height <span id="v-hdata"></span></label>
          <input type="range" id="sl-hdata" min="6" max="35" value="13.5" step="0.5">
        </div>
        <div class="ctrl-row">
          <label>Color Bar <span id="v-barwidth"></span></label>
          <input type="range" id="sl-barwidth" min="0.5" max="8" value="2.5" step="0.5">
        </div>
      </div>

      <div class="ctrl-group">
        <div class="ctrl-group-title">Text & Padding</div>
        <div class="ctrl-row">
          <label>Code Size <span id="v-codefont"></span></label>
          <input type="range" id="sl-codefont" min="4" max="18" value="11.5" step="0.5">
        </div>
        <div class="ctrl-row">
          <label>Desc Size <span id="v-descfont"></span></label>
          <input type="range" id="sl-descfont" min="3" max="14" value="8.5" step="0.5">
        </div>
        <div class="ctrl-row">
          <label>Side Padding <span id="v-padleft"></span></label>
          <input type="range" id="sl-padleft" min="0" max="10" value="6.5" step="0.5">
        </div>
      </div>

      <div class="ctrl-group">
        <div class="ctrl-group-title">Graphics & Icons</div>
        <div class="ctrl-row">
          <label>Icon Size <span id="v-iconsize"></span></label>
          <input type="range" id="sl-iconsize" min="2" max="22" value="5.5" step="0.5">
        </div>
        <div class="ctrl-row">
          <label>Icon Spacing <span id="v-spacing"></span></label>
          <input type="range" id="sl-spacing" min="0" max="12" value="2.5" step="0.5">
        </div>
        <div class="ctrl-row">
          <label>Icon Opacity <span id="v-opacity"></span></label>
          <input type="range" id="sl-opacity" min="0" max="100" value="62">
        </div>
        <div class="ctrl-row">
          <label>Stripe Opacity <span id="v-stripe-opacity"></span></label>
          <input type="range" id="sl-stripe-opacity" min="0" max="50" value="6">
        </div>
      </div>

      <div class="ctrl-group">
        <div class="ctrl-group-title">Page Setup</div>
        <div class="ctrl-row">
          <label>Paper Size</label>
          <select id="sl-pagesize">
            <option value="A4" selected>A4 (210×297mm)</option>
            <option value="A3">A3 (297×420mm)</option>
            <option value="A5">A5 (148×210mm)</option>
            <option value="Letter">US Letter (216×279mm)</option>
            <option value="Legal">US Legal (216×356mm)</option>
            <option value="B4">B4 (250×353mm)</option>
            <option value="B5">B5 (176×250mm)</option>
          </select>
        </div>
        <div class="ctrl-row">
          <label>Orientation</label>
          <select id="sl-orient">
            <option value="portrait">Portrait</option>
            <option value="landscape" selected>Landscape</option>
          </select>
        </div>
      </div>

    </div>
    <div class="ctrl-bottom">
      <button class="btn-print" id="btn-print">&#128424; Print Labels</button>
      <span id="page-note"></span>
    </div>
  </div>

  <div id="preview-area">
    <div id="page-preview">
      <div id="label-content"></div>
    </div>
  </div>

</div><!-- /panel-preview -->
</div><!-- /app -->

<style id="dyn-style"></style>

// ─── State ────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'labelmaker-v1';
let labelGroups = [];
let _nextId = 200;
function genId() { return 'x' + (_nextId++); }

function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(labelGroups)); } catch(e) {}
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { labelGroups = JSON.parse(raw); return; }
  } catch(e) {}
  labelGroups = JSON.parse(JSON.stringify(DEFAULT_GROUPS));
}

// ─── Helpers ──────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function makeSVG(iconKey, color, iconMM, spacingMM) {
  const body = ICON_BODIES[iconKey];
  if (!body) return null;
  const pad = iconMM > 0 ? (spacingMM / iconMM) * 12 : 0;
  const v0 = -pad, vw = 24 + pad * 2;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${v0} ${v0} ${vw} ${vw}">${body.replace(/COLOR/g, color)}</svg>`;
  return `url("data:image/svg+xml,${encodeURIComponent(svg)}")`;
}

// ─── Label preview renderer ───────────────────────────────────────────────
function renderLabels() {
  const content = document.getElementById('label-content');
  const usedTypes = new Set();
  let html = '';

  for (const group of labelGroups) {
    if (!group.labels?.length) continue;
    html += `<div class="section-title">&#9646; ${esc(group.title)}</div><div class="label-row">`;

    for (const label of group.labels) {
      // Resolve icon key: 'auto' → same as type, 'none' → null, explicit → that key
      const iconKey = label.icon === 'auto' ? null : (label.icon === 'none' ? 'none' : label.icon);
      const iconAttr = iconKey ? ` data-icon="${iconKey}"` : '';
      usedTypes.add(label.type);

      const face = `<div class="face-bg"${iconAttr}></div>
        <div class="face-content">
          <div class="code">${esc(label.code)}</div>
          <div class="desc">${esc(label.desc)}</div>
        </div>`;

      html += `<div class="label data cat-${label.type}">
        <div class="face">${face}</div>
        <div class="wrap-zone"><div class="wrap-bg"${iconAttr}></div><span class="wrap-text">wrap</span></div>
        <div class="face2">${face}</div>
      </div>`;
    }
    html += `</div>`;
  }

  // Legend — only types actually used
  if (usedTypes.size) {
    html += `<div class="section-title" style="margin-top:3mm;">&#9646; Category Key</div><div class="legend">`;
    for (const type of ['ac','dc','eth','fbr','sw']) {
      if (!usedTypes.has(type)) continue;
      html += `<div class="legend-item"><div class="legend-bar" style="background:${TYPE_COLORS[type]};"></div><span>${TYPE_LABELS[type]}</span></div>`;
    }
    html += `</div>`;
  }

  content.innerHTML = html;
}

// ─── Dimension / style updater ────────────────────────────────────────────
const PAGE_SIZES = {
  'A4':[210,297],'A3':[297,420],'A5':[148,210],
  'Letter':[216,279],'Legal':[216,356],'B4':[250,353],'B5':[176,250]
};
const MM = 3.7795;
const dynStyle = document.getElementById('dyn-style');
const preview  = document.getElementById('page-preview');
const pageSt   = document.createElement('style');
document.head.appendChild(pageSt);
const g = id => document.getElementById(id);

function update() {
  const opacity       = g('sl-opacity').value / 100;
  const stripeOpacity = g('sl-stripe-opacity').value / 100;
  const iconsize      = parseFloat(g('sl-iconsize').value);
  const spacing       = parseFloat(g('sl-spacing').value);
  const codefont      = g('sl-codefont').value;
  const descfont      = g('sl-descfont').value;
  const hdata         = g('sl-hdata').value;
  const facewidth     = g('sl-facewidth').value;
  const wrapwidth     = g('sl-wrapwidth').value;
  const barwidth      = g('sl-barwidth').value;
  const padleft       = g('sl-padleft').value;
  const pagesize      = g('sl-pagesize').value;
  const orient        = g('sl-orient').value;

  g('v-opacity').textContent        = Math.round(opacity * 100) + '%';
  g('v-stripe-opacity').textContent = Math.round(stripeOpacity * 100) + '%';
  g('v-iconsize').textContent       = iconsize + 'mm';
  g('v-spacing').textContent        = spacing  + 'mm';
  g('v-codefont').textContent       = codefont + 'pt';
  g('v-descfont').textContent       = descfont + 'pt';
  g('v-hdata').textContent          = hdata    + 'mm';
  g('v-facewidth').textContent      = facewidth + 'mm';
  g('v-wrapwidth').textContent      = wrapwidth + 'mm';
  g('v-barwidth').textContent       = barwidth  + 'mm';
  g('v-padleft').textContent        = padleft   + 'mm';

  let [pw, ph] = PAGE_SIZES[pagesize] || [210,297];
  if (orient === 'landscape') [pw, ph] = [ph, pw];
  g('page-note').textContent = `${pagesize} · ${orient === 'portrait' ? 'Portrait' : 'Landscape'}  (${pw}×${ph}mm)`;
  preview.style.width    = (pw * MM) + 'px';
  preview.style.minHeight = (ph * MM) + 'px';

  // Build icon CSS:
  //   - .cat-TYPE .face-bg (no data-icon) → auto: use type's own icon
  //   - .cat-TYPE [data-icon="KEY"] → explicit override, colored with type color
  //   - [data-icon="none"] → hidden
  const bgSize = `background-size:${iconsize}mm ${iconsize}mm;background-repeat:repeat;opacity:${opacity};`;
  let iconCSS = '';
  for (const [type, color] of Object.entries(TYPE_COLORS)) {
    // Auto (no data-icon attr) — icon shape = type's own icon
    const autoUrl = makeSVG(type, color, iconsize, spacing);
    if (autoUrl) iconCSS += `.cat-${type} .face-bg:not([data-icon]),.cat-${type} .wrap-bg:not([data-icon]){background-image:${autoUrl};${bgSize}}`;

    // Explicit icon overrides — icon shape from data-icon, color from type
    for (const iconKey of Object.keys(ICON_BODIES)) {
      const url = makeSVG(iconKey, color, iconsize, spacing);
      if (url) iconCSS += `.cat-${type} [data-icon="${iconKey}"]{background-image:${url};${bgSize}}`;
    }
  }
  iconCSS += `[data-icon="none"]{background-image:none!important;opacity:0!important;}`;

  const bars = Object.keys(TYPE_COLORS).map(c =>
    `.cat-${c} .face{border-left:${barwidth}mm solid var(--col-${c});}` +
    `.cat-${c} .face2{border-right:${barwidth}mm solid var(--col-${c});}` +
    `.cat-${c} .wrap-zone{border-left:${barwidth}mm solid var(--col-${c});border-right:${barwidth}mm solid var(--col-${c});}`
  ).join('');

  const stripeGrad = `repeating-linear-gradient(-45deg, rgba(0,0,0,${stripeOpacity}), rgba(0,0,0,${stripeOpacity}) 1.5mm, transparent 1.5mm, transparent 3mm)`;

  dynStyle.textContent = `
    .label.data{height:${hdata}mm;}
    .face,.face2{width:${facewidth}mm;padding-left:${padleft}mm;padding-right:${padleft}mm;}
    .wrap-zone{width:${wrapwidth}mm;background-image:${stripeGrad};}
    .face-content .code{font-size:${codefont}pt;}
    .face-content .desc{font-size:${descfont}pt;}
    ${iconCSS}${bars}
  `;
  pageSt.textContent = `@media print{@page{size:${pw}mm ${ph}mm;margin:8mm;}}`;
}

// ─── Editor renderer ──────────────────────────────────────────────────────
function renderEditor() {
  const list = document.getElementById('groups-list');
  list.innerHTML = '';

  labelGroups.forEach((group, gi) => {
    const card = document.createElement('div');
    card.className = 'group-card';

    // Header
    const header = document.createElement('div');
    header.className = 'group-header';

    const titleInput = document.createElement('input');
    titleInput.className = 'group-title-input';
    titleInput.value = group.title;
    titleInput.placeholder = 'Group Title';
    titleInput.addEventListener('input', e => {
      labelGroups[gi].title = e.target.value;
      saveData(); renderLabels();
    });

    const addBtn = document.createElement('button');
    addBtn.className = 'btn btn-secondary';
    addBtn.style.cssText = 'font-size:9px;padding:4px 10px;';
    addBtn.textContent = '+ Label';
    addBtn.addEventListener('click', () => addLabel(group.id));

    const delGroupBtn = document.createElement('button');
    delGroupBtn.className = 'btn-icon';
    delGroupBtn.title = 'Delete group';
    delGroupBtn.textContent = '✕';
    delGroupBtn.addEventListener('click', () => deleteGroup(group.id));

    header.appendChild(titleInput);
    header.appendChild(addBtn);
    header.appendChild(delGroupBtn);

    // Table
    const table = document.createElement('table');
    table.className = 'labels-table';
    table.innerHTML = `<thead><tr>
      <th style="width:18%">Code</th>
      <th>Description</th>
      <th style="width:13%">Type</th>
      <th style="width:12%">Icon</th>
      <th style="width:28px"></th>
    </tr></thead>`;

    const tbody = document.createElement('tbody');

    group.labels.forEach((label) => {
      const tr = document.createElement('tr');

      // Code
      const tdCode = document.createElement('td');
      const codeIn = document.createElement('input');
      codeIn.className = 'cell-input code';
      codeIn.value = label.code;
      codeIn.placeholder = 'CODE';
      codeIn.addEventListener('input', e => {
        label.code = e.target.value.toUpperCase();
        codeIn.value = label.code;
        saveData(); renderLabels();
      });
      tdCode.appendChild(codeIn);

      // Description
      const tdDesc = document.createElement('td');
      const descIn = document.createElement('input');
      descIn.className = 'cell-input';
      descIn.value = label.desc;
      descIn.placeholder = 'Description';
      descIn.addEventListener('input', e => {
        label.desc = e.target.value;
        saveData(); renderLabels();
      });
      tdDesc.appendChild(descIn);

      // Type (with swatch)
      const tdType = document.createElement('td');
      const typeWrap = document.createElement('div');
      typeWrap.className = 'type-cell';
      const swatch = document.createElement('div');
      swatch.className = 'type-swatch';
      swatch.style.background = TYPE_COLORS[label.type] || '#888';
      const typeSel = document.createElement('select');
      typeSel.className = 'cell-select';
      for (const [k, v] of Object.entries(TYPE_LABELS)) {
        const opt = document.createElement('option');
        opt.value = k; opt.textContent = v;
        if (k === label.type) opt.selected = true;
        typeSel.appendChild(opt);
      }
      typeSel.addEventListener('change', e => {
        label.type = e.target.value;
        swatch.style.background = TYPE_COLORS[label.type];
        saveData(); renderLabels();
      });
      typeWrap.appendChild(swatch);
      typeWrap.appendChild(typeSel);
      tdType.appendChild(typeWrap);

      // Icon
      const tdIcon = document.createElement('td');
      const iconSel = document.createElement('select');
      iconSel.className = 'cell-select';
      for (const [k, v] of Object.entries(ICON_LABELS)) {
        const opt = document.createElement('option');
        opt.value = k; opt.textContent = v;
        if (k === label.icon) opt.selected = true;
        iconSel.appendChild(opt);
      }
      iconSel.addEventListener('change', e => {
        label.icon = e.target.value;
        saveData(); renderLabels();
      });
      tdIcon.appendChild(iconSel);

      // Delete
      const tdDel = document.createElement('td');
      const delBtn = document.createElement('button');
      delBtn.className = 'btn-icon';
      delBtn.textContent = '✕';
      delBtn.title = 'Delete label';
      delBtn.addEventListener('click', () => { deleteLabel(group.id, label.id); });
      tdDel.appendChild(delBtn);

      tr.appendChild(tdCode);
      tr.appendChild(tdDesc);
      tr.appendChild(tdType);
      tr.appendChild(tdIcon);
      tr.appendChild(tdDel);
      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    card.appendChild(header);
    card.appendChild(table);
    list.appendChild(card);
  });
}

// ─── Data mutations ───────────────────────────────────────────────────────
function addGroup() {
  labelGroups.push({ id: genId(), title: 'New Group', labels: [] });
  saveData(); renderEditor(); renderLabels();
  // Scroll to new group
  document.getElementById('groups-list').lastElementChild?.scrollIntoView({ behavior: 'smooth' });
}

function deleteGroup(gid) {
  if (labelGroups.find(g => g.id === gid)?.labels.length > 0) {
    if (!confirm('Delete this group and all its labels?')) return;
  }
  labelGroups = labelGroups.filter(g => g.id !== gid);
  saveData(); renderEditor(); renderLabels();
}

function addLabel(gid) {
  const group = labelGroups.find(g => g.id === gid);
  if (!group) return;
  // Guess type from last label in group, or first label of any group, or 'eth'
  const lastType = group.labels[group.labels.length - 1]?.type ?? 'eth';
  group.labels.push({ id: genId(), code: '', desc: '', type: lastType, icon: 'auto' });
  saveData(); renderEditor(); renderLabels();
}

function deleteLabel(gid, lid) {
  const group = labelGroups.find(g => g.id === gid);
  if (!group) return;
  group.labels = group.labels.filter(l => l.id !== lid);
  saveData(); renderEditor(); renderLabels();
}

// ─── Import / Export ──────────────────────────────────────────────────────
function exportJSON() {
  const blob = new Blob([JSON.stringify(labelGroups, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'labels.json';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function importJSON(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('Expected an array of groups');
      labelGroups = data;
      saveData(); renderEditor(); renderLabels();
    } catch(err) {
      alert('Import failed: ' + err.message);
    }
  };
  reader.readAsText(file);
}

// ─── Tab switching ────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + name));
  if (name === 'preview') update();
}

// ─── Init ─────────────────────────────────────────────────────────────────
loadData();
renderEditor();
renderLabels();

document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => switchTab(b.dataset.tab)));
document.querySelectorAll('#ctrl-panel input[type=range], #ctrl-panel select').forEach(el => el.addEventListener('input', update));
g('btn-print').addEventListener('click',    () => setTimeout(() => window.print(), 100));
g('btn-add-group').addEventListener('click', addGroup);
g('btn-export').addEventListener('click',   exportJSON);
g('btn-import').addEventListener('click',   () => g('file-import').click());
g('file-import').addEventListener('change', e => { if (e.target.files[0]) importJSON(e.target.files[0]); e.target.value = ''; });

update();
</script>
