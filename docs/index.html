<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Label Information</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: #0f3460;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      max-width: 500px;
      width: 100%;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #e94560 0%, #c01010 100%);
      color: white;
      padding: 30px 24px;
      text-align: center;
    }

    .code-badge {
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 2px;
      font-family: 'Courier New', monospace;
      margin-bottom: 8px;
    }

    .content {
      padding: 30px 24px;
    }

    .section {
      margin-bottom: 28px;
    }

    .section:last-child {
      margin-bottom: 0;
    }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #e94560;
      margin-bottom: 12px;
    }

    .section-text {
      font-size: 16px;
      line-height: 1.6;
      color: #e0e0e0;
      word-wrap: break-word;
    }

    .section-text.arabic {
      direction: rtl;
      text-align: right;
      font-size: 15px;
      color: #d0d0d0;
      line-height: 1.8;
    }

    .divider {
      height: 1px;
      background: #e0e0e0;
      margin: 20px 0;
    }

    .loading {
      text-align: center;
      padding: 40px 24px;
      color: #999;
    }

    .error {
      background: rgba(233, 69, 96, 0.2);
      color: #ff6b7a;
      padding: 20px;
      border-radius: 8px;
      margin: 20px;
      text-align: center;
      border: 1px solid #e94560;
    }

    .info-page {
      padding: 40px 24px;
      text-align: center;
    }

    .info-page h1 {
      font-size: 24px;
      color: #e0e0e0;
      margin-bottom: 12px;
    }

    .info-page p {
      color: #b0b0b0;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .examples {
      text-align: left;
      margin-top: 20px;
    }

    .examples li {
      list-style: none;
      padding: 8px 0;
    }

    .examples a {
      color: #ff6b7a;
      text-decoration: none;
      font-weight: 500;
    }

    .examples a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="loading">Loading...</div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const app = document.getElementById('app');

    if (!code) {
      // Show info page if no code
      app.innerHTML = `
        <div class="header">
          <div class="code-badge">🏷️ LABEL MAKER</div>
          <p style="opacity: 0.9; margin: 0;">QR Code Information Service</p>
        </div>
        <div class="info-page">
          <h1>Welcome!</h1>
          <p>Scan a QR code or use a label code to view information.</p>
          <div class="examples">
            <p style="font-weight: 600; margin-bottom: 12px; color: #e0e0e0;">Example codes:</p>
            <ul>
              <li><a href="?code=AC-CHG-IN">AC-CHG-IN</a> - Power input</li>
              <li><a href="?code=ETH-ROOM">ETH-ROOM</a> - Ethernet connection</li>
              <li><a href="?code=HOME-SARA">HOME-SARA</a> - Network port</li>
            </ul>
          </div>
        </div>
      `;
      return;
    }

    // Validate code format
    if (!/^[A-Za-z0-9\-_]+$/.test(code)) {
      app.innerHTML = '<div class="error">❌ Invalid code format</div>';
      return;
    }

    // Fetch the text file using jsdelivr CDN (better CORS support)
    const fileUrl = `https://cdn.jsdelivr.net/gh/dark-cli/label-maker@master/qr_codes/${code}.txt`;

    console.log('Fetching:', fileUrl);

    // Create abort controller with 10 second timeout
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 10000);

    fetch(fileUrl, { signal: controller.signal })
      .then(response => {
        clearTimeout(timeoutId);
        if (!response.ok) {
          throw new Error(`Label "${code}" not found (${response.status})`);
        }
        return response.text();
      })
      .then(text => {
        if (!text || text.trim().length === 0) {
          throw new Error('Empty response');
        }

        // Parse English and Arabic sections
        const sections = text.split('---').map(s => s.trim());
        const english = sections[0] || 'N/A';
        const arabic = sections[1] || 'N/A';

        console.log('Success:', { code, english: english.substring(0, 30), arabic: arabic.substring(0, 30) });

        // Render content
        app.innerHTML = `
          <div class="header">
            <div class="code-badge">${code}</div>
          </div>
          <div class="content">
            <div class="section">
              <div class="section-title">English</div>
              <div class="section-text">${escapeHtml(english)}</div>
            </div>

            <div class="divider"></div>

            <div class="section">
              <div class="section-title">العربية</div>
              <div class="section-text arabic">${escapeHtml(arabic)}</div>
            </div>
          </div>
        `;
      })
      .catch(error => {
        clearTimeout(timeoutId);
        console.error('Fetch error:', error);
        const errorMsg = error.name === 'AbortError' ? 'Request timeout - network issue' : error.message;
        app.innerHTML = `
          <div class="error">
            ❌ ${escapeHtml(errorMsg)}<br>
            <small style="opacity: 0.8;">URL: ${fileUrl}</small><br>
            <small style="opacity: 0.8;">Check browser console (F12) for details</small>
          </div>
        `;
      });

    // Escape HTML to prevent XSS
    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }
  </script>
</body>
</html>
