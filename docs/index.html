<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Label Information</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f5f5f5;
      --bg-box: #ffffff;
      --border: #cccccc;
      --border-strong: #888888;
      --text: #1a1a1a;
      --text-muted: #666666;
      --accent: #1a1a1a;
    }

    body.dark {
      --bg: #0a0a0a;
      --bg-box: #1a1a1a;
      --border: #444444;
      --border-strong: #888888;
      --text: #e0e0e0;
      --text-muted: #999999;
      --accent: #e0e0e0;
    }

    body {
      font-family: 'IBM Plex Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background 0.3s, color 0.3s;
    }

    .terminal-box {
      background: var(--bg-box);
      border: 1px solid var(--border-strong);
      max-width: 540px;
      width: 100%;
      overflow: hidden;
    }

    .term-header {
      background: var(--accent);
      color: var(--bg);
      padding: 16px 20px;
      font-weight: 700;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
    }

    .term-code {
      font-size: 24px;
      letter-spacing: 0.1em;
      margin-bottom: 4px;
      font-family: 'IBM Plex Mono', monospace;
    }

    .term-body {
      padding: 24px 20px;
    }

    .term-section {
      margin-bottom: 24px;
    }

    .term-section:last-child {
      margin-bottom: 0;
    }

    .term-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 10px;
      text-transform: uppercase;
      padding: 8px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .term-text {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .term-text.arabic {
      direction: rtl;
      text-align: right;
      font-size: 14px;
      line-height: 1.8;
    }

    .term-divider {
      height: 1px;
      background: var(--border);
      margin: 18px 0;
    }

    #toggle-theme {
      position: fixed;
      top: 16px;
      right: 16px;
      background: var(--accent);
      color: var(--bg-box);
      border: 1px solid var(--border-strong);
      padding: 8px 12px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      z-index: 1000;
      transition: background 0.3s, color 0.3s;
    }

    #toggle-theme:hover {
      opacity: 0.8;
    }

    .loading {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .error {
      background: var(--bg);
      color: var(--text);
      padding: 20px;
      margin: 20px;
      text-align: center;
      border: 1px solid var(--border-strong);
      font-size: 13px;
      line-height: 1.6;
    }

    .error small {
      display: block;
      opacity: 0.7;
      margin-top: 8px;
    }

    .info-page {
      padding: 24px 20px;
      text-align: center;
    }

    .info-page h1 {
      font-size: 18px;
      color: var(--text);
      margin-bottom: 12px;
      letter-spacing: 0.05em;
    }

    .info-page p {
      color: var(--text-muted);
      margin-bottom: 18px;
      line-height: 1.6;
      font-size: 13px;
    }

    .examples {
      text-align: left;
      margin-top: 18px;
    }

    .examples li {
      list-style: none;
      padding: 6px 0;
    }

    .examples a {
      color: var(--accent);
      text-decoration: underline;
      font-weight: 700;
    }

    .examples a:hover {
      opacity: 0.7;
    }

    @media print {
      body { background: white; color: black; }
      #toggle-theme { display: none; }
      .terminal-box { border: 1px solid #000; box-shadow: none; }
      .term-header { background: white; color: black; border: 1px solid #000; }
      .term-text { color: black; }
    }
  </style>
</head>
<body>
  <button id="toggle-theme">◐</button>
  <div class="terminal-box" id="app">
    <div class="loading">Loading...</div>
  </div>

  <script>
    // Theme toggle
    const savedTheme = localStorage.getItem('lm-theme') || 'light';
    if (savedTheme === 'dark') document.body.classList.add('dark');
    document.getElementById('toggle-theme').addEventListener('click', () => {
      document.body.classList.toggle('dark');
      localStorage.setItem('lm-theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    });

    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const app = document.getElementById('app');

    // Escape HTML to prevent XSS
    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    if (!code) {
      // Show info page if no code
      app.innerHTML = `
        <div class="term-header">
          <div class="term-code">&gt; LABEL MAKER</div>
        </div>
        <div class="info-page">
          <h1>Welcome!</h1>
          <p>Scan a QR code or use a label code to view information.</p>
          <div class="examples">
            <p style="font-weight: 700; margin-bottom: 12px;">Example codes:</p>
            <ul>
              <li><a href="?code=AC-CHG-IN">AC-CHG-IN</a> — Power input</li>
              <li><a href="?code=ETH-ROOM">ETH-ROOM</a> — Ethernet connection</li>
              <li><a href="?code=HOME-SARA">HOME-SARA</a> — Network port</li>
            </ul>
          </div>
        </div>
      `;
    } else if (!/^[A-Za-z0-9\-_]+$/.test(code)) {
      // Validate code format
      app.innerHTML = '<div class="error">❌ Invalid code format</div>';
    } else {
      // Fetch the text file using jsdelivr CDN (better CORS support)
      const fileUrl = `https://cdn.jsdelivr.net/gh/dark-cli/label-maker@master/qr_codes/${code}.txt`;

      console.log('Fetching:', fileUrl);

      // Create abort controller with 10 second timeout
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 10000);

      fetch(fileUrl, { signal: controller.signal })
        .then(response => {
          clearTimeout(timeoutId);
          if (!response.ok) {
            throw new Error(`Label "${code}" not found (${response.status})`);
          }
          return response.text();
        })
        .then(text => {
          if (!text || text.trim().length === 0) {
            throw new Error('Empty response');
          }

          // Parse English and Arabic sections
          const sections = text.split('---').map(s => s.trim());
          const english = sections[0] || 'N/A';
          const arabic = sections[1] || 'N/A';

          console.log('Success:', { code, english: english.substring(0, 30), arabic: arabic.substring(0, 30) });

          // Render content
          app.innerHTML = `
            <div class="term-header">
              <div class="term-code">&gt; ${escapeHtml(code)}</div>
            </div>
            <div class="term-body">
              <div class="term-section">
                <div class="term-label">English</div>
                <div class="term-text">${escapeHtml(english)}</div>
              </div>

              <div class="term-divider"></div>

              <div class="term-section">
                <div class="term-label">العربية</div>
                <div class="term-text arabic">${escapeHtml(arabic)}</div>
              </div>
            </div>
          `;
        })
        .catch(error => {
          clearTimeout(timeoutId);
          console.error('Fetch error:', error);
          const errorMsg = error.name === 'AbortError' ? 'Request timeout - network issue' : error.message;
          app.innerHTML = `
            <div class="error">
              ❌ ${escapeHtml(errorMsg)}<br>
              <small>URL: ${fileUrl}</small><br>
              <small>Check browser console (F12) for details</small>
            </div>
          `;
        });
    }
  </script>
</body>
</html>
